<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="appHeader" class="site-header">
    <div class="header-inner">

        <!-- Logo — pinned left -->
        <a href="/" class="brand-wrap">
            <img
                th:src="@{/pics/logo.png}"
                src="/pics/logo.png"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
                alt="Light the Deal logo"
                class="brand-logo"
            />
            <div class="brand-logo-fallback" style="display:none;">LTD</div>
        </a>

        <!-- Title — absolutely centred in the header bar -->
        <h1 class="brand-title">Light the Deal</h1>

        <!-- Spacer mirrors logo width to keep title truly centred -->
        <span class="header-spacer"></span>

    </div>
</header>
</body>
</html>
