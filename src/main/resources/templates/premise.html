<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Light the Deal — Premises</title>
    <link rel="stylesheet" th:href="@{/css/entities.css}"/>
</head>
<body>

<header class="site-header">
    <a th:href="@{profile}" class="header-logo">
        <img th:src="@{/pics/logo.png}" alt="Light the Deal"/>
        <div class="header-brand">Light the Deal <span>technician dashboard</span></div>
    </a>
    <a th:href="@{/profile}" class="back-btn">← Back to Profile</a>
</header>

<div class="page-hero">
    <div class="page-title-block">
        <div class="page-eyebrow">Entity Management · Premises</div>
        <div class="page-title">🏢 Premises</div>
        <div class="page-subtitle">Register and manage work locations & sites</div>
    </div>
    <img th:src="@{/pics/logo.png}"
         class="page-logo-accent" alt=""/>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('create',this)">Add Premise</button>
    <button class="tab-btn" onclick="switchTab('list',this)">All Premises</button>
    <button class="tab-btn" onclick="switchTab('update',this)">Update Premise</button>
</div>

<div class="content-area">

    <!-- CREATE -->
    <div class="tab-panel active" id="tab-create">
        <div class="section-label">New Premise</div>
        <div class="form-card">

            <form th:action="@{/premise}" th:method="POST" th:object="${premiseRequest}">
                <input type="hidden" th:value="${userId}" name="userId"/>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Premise Name</label>
                        <input class="form-input" th:field="*{name}" placeholder="e.g. Warehouse Sofia-North"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Type</label>
                        <select class="form-select" th:field="*{type}">
                            <option value="">— Select type —</option>
                            <option th:each="t: ${premiseTypes}"
                                    th:value="${t}"
                                    th:text="${t}"
                                    th:selected="${t == premiseRequest.type}">
                            </option>
                        </select>

                    </div>
                    <div class="form-group span2">
                        <label class="form-label">Address</label>
                        <input class="form-input" th:field="*{address}" placeholder="Street, number, city, postcode"/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Linked Customer</label>
                        <select class="form-select" th:field="*{customerId}">
                            <option value="">— Select customer —</option>
                            <option th:each="c : ${customers}"
                                    th:value="${c.id}"
                                    th:text="${c.firstName + ' ' + c.lastName}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Area (m²)</label>
                        <input class="form-input" type="number" placeholder="0" th:field="*{area}"/>
                    </div>

                    <div class="form-group span2">
                        <label class="form-label">Description</label>
                        <textarea class="form-textarea"
                                  placeholder="Layout details, electrical specification, special requirements…"
                                  th:field="*{description}"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary">⚡ Add Premise</button>
                    <button class="btn btn-secondary">Reset</button>
                </div>
            </form>
        </div>
    </div>

    <!-- LIST -->
    <div class="tab-panel" id="tab-list">
        <div class="section-label">All Premises</div>
        <div class="data-table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Address</th>
                    <th>Customer</th>
                    <th>Area</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(premiseList)}">
                    <td colspan="6" style="text-align:center; color:var(--text-dim); padding: 32px;">
                        No premise yet. Add your first one using the "Add Premise" tab.
                    </td>
                </tr>
                <tr th:each="p: ${premiseList}" th:unless="${#lists.isEmpty(premiseList)}">
                    <td th:text="${p.name}">-</td>
                    <td th:text="${p.type}" >-</td>
                    <td th:text="${p.address}">-</td>
                    <td th:text="${p.customerName}">-</td>
                    <td th:text="${p.area}">-</td>
                    <td th:text="${p.description}">-</td>

                    <td>
                        <div class="table-actions">
                            <button class="tbl-btn"
                                    onclick="switchTab('update',document.querySelectorAll('.tab-btn')[2])">Edit
                            </button>
                            <form th:action="@{/premise./{id}/delete(id=${p.id})}" method="post"
                                  style="display:inline;">
                                <button class="tbl-btn del" type="submit"
                                        onclick="return confirm('Delete this premise?')">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>


                </tbody>
            </table>
        </div>
    </div>

    <!-- UPDATE -->
    <div class="tab-panel" id="tab-update">
        <div class="section-label">Update Premise</div>
        <div class="form-card">
            <div class="form-grid single" style="margin-bottom:16px;">
                <div class="form-group">
                    <label class="form-label">Select Premise to Edit</label>
                    <select class="form-select">
                        <option value="">— Pick a premise —</option>
                        <option>1 · Warehouse Sofia-North</option>
                        <option>2 · Office Plovdiv-Centre</option>
                        <option>3 · Villa Varna-South</option>
                    </select>
                </div>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Premise Name</label>
                    <input class="form-input"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Type</label>
                    <select class="form-select">
                        <option>RESIDENTIAL</option>
                        <option>COMMERCIAL</option>
                        <option>INDUSTRIAL</option>
                        <option>WAREHOUSE</option>
                        <option>OFFICE</option>
                        <option>OTHER</option>
                    </select>
                </div>
                <div class="form-group span2">
                    <label class="form-label">Address</label>
                    <input class="form-input"/>
                </div>
                <div class="form-group">
                    <label class="form-label">City</label>
                    <input class="form-input"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Area (m²)</label>
                    <input class="form-input" type="number"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Access Notes</label>
                    <input class="form-input"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Floors</label>
                    <input class="form-input" type="number"/>
                </div>
                <div class="form-group span2">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea"></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary">💾 Save Changes</button>
                <button class="btn btn-secondary">Cancel</button>
                <button class="btn btn-danger" style="margin-left:auto;">Delete Premise</button>
            </div>
        </div>
    </div>

</div>

<div th:insert="~{fragments/footer::footer}"></div>


<script>
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        if (btn) btn.classList.add('active');
    }
</script>
</body>
</html>
