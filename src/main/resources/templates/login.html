<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In · Light the Deal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="card">

        <div class="brand">
            <a class="logo" th:href="@{/}">
                <img th:src="@{/pics/logo.png}" alt="Light the Deal logo">
            </a>
            <span class="brand-fallback" style="display:none;">L</span>
            <span class="brand-name">Light the Deal</span>
        </div>

        <div class="tabs">
            <button class="tab active" id="tab-login"    onclick="switchTab('login')">Sign in</button>
            <button class="tab"        id="tab-register" onclick="switchTab('register')">Create account</button>
        </div>
        <!-- ── SIGN IN ──────────────────────────────── -->
        <div class="panel active" id="panel-login">

            <div class="alert alert-error hidden"   id="login-error">
                ✕ &nbsp;Invalid username or password. Please try again.
            </div>
            <div class="alert alert-success hidden" id="login-logout">
                ✓ &nbsp;You have been signed out successfully.
            </div>

            <form th:action="@{/login}" th:method="post" th:object="${userLoginRequest}">

                <div class="fg">
                    <label for="login-username">Username or email</label>
                    <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
                        <input type="text" id="login-username" name="username"
                               placeholder="you@example.com"
                               autocomplete="username" required th:field="*{username}">
                    </div>
                </div>

                <div class="fg">
                    <label for="login-password">Password</label>
                    <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
                        <input type="password" id="login-password" name="password"
                               placeholder="••••••••"
                               autocomplete="current-password" required th:field="*{password}">
                        <button type="button" class="pw-eye" onclick="togglePw('login-password',this)">👁</button>
                    </div>
                </div>

                <div class="row-opts">
                    <label class="cb-label">
                        <input type="checkbox" name="remember-me" /> Remember me
                    </label>
                    <a th:href="@{/forgot-password}" class="link-btn">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">
                    <span>⚡ Sign In</span>
                </button>

            </form>

            <div class="switch-row">
                No account? <button onclick="switchTab('register')">Create one</button>
            </div>
        </div>

        <!-- REGISTER -->
        <div class="panel" id="panel-register">

            <form th:action="@{/register}" th:method="post" th:object="${registerRequestUser}" novalidate>
                <div class="fg">
                    <label for="reg-username">Username</label>
                    <div class="input-wrap">
                        <span class="input-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                        <input type="text" id="reg-username" name="username" placeholder="johndoe" minlength="6" required th:field="*{username}" />
                    </div>
                    <div class="field-hint" id="hint-username">At least 6 characters, no spaces.</div>
                </div>
                <div class="fg">
                    <label for="reg-email">Email</label>
                    <div class="input-wrap">
                        <input type="email" id="reg-email" placeholder="you@example.com"
                               required th:field="*{email}" />
                    </div>
                </div>
                <div class="fg">
                    <label for="reg-phone">Phone Number</label>
                    <div class="input-wrap">
                        <input type="text" id="reg-phone" placeholder="+359 88 888 8888"
                               required th:field="*{phoneNumber}" />
                    </div>
                </div>
                <div class="fg">
                    <label for="reg-password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="reg-password" placeholder="Min. 8 characters"
                               minlength="8" required th:field="*{password}"/>
                    </div>
                </div>
                <div class="fg">
                    <label for="reg-confirm">Confirm password</label>
                    <div class="input-wrap">
                        <input type="password" id="reg-confirm" placeholder="Repeat your password"
                               required th:field="*{confirmPassword}" />
                    </div>
                </div>

                <button type="submit" class="btn-submit" >Create account</button>
            </form>

            <div class="switch-row">Already have an account? <button onclick="switchTab('login')">Sign in</button></div>
        </div>

    </div>
</div>

<!--<script src="/js/login.js"></script>-->
<script>
    function switchTab(name) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('panel-' + name).classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
    }

    // Open register tab automatically if ?tab=register is in the URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'register') {
        switchTab('register');
    }
</script>
</body>
</html>
