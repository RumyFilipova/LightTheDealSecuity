<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home · Light the Deal</title>
    <link rel="stylesheet" th:href="@{/css/home.css}" href="/css/home.css">
</head>
<body>
<div class="page-shell">

    <!-- HEADER -->
    <div th:replace="~{fragments/header :: appHeader}"></div>

    <!-- HERO: background image as a real div, not on main -->
    <main class="main-content">
        <div class="hero-bg" style="background-image: url('/pics/PicBackground.jpg');"></div>

        <!-- Prominent logo above the card -->
        <div class="hero-logo-wrap">
            <img th:src="@{/pics/logo.png}" src="/pics/logo.png"
                 alt="Light the Deal logo" class="hero-logo"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="hero-logo-fallback" style="display:none;">L</span>
            <div class="hero-brand-text">
                <span class="hero-brand-name">Light the Deal</span>
                <span class="hero-brand-tagline">Find the best deals first</span>
            </div>
        </div>

        <section class="auth-card">
            <h2>Sign In</h2>
            <div class="auth-switch" aria-label="Authentication options">
                <a href="/home"     class="auth-option active">Sign In</a>
                <a href="/register" class="auth-option">Register</a>
            </div>
            <form action="/login" method="post">
                <div class="field">
                    <label for="username">Username or email</label>
                    <input id="username" name="username" type="text" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required>
                </div>
                <button type="submit" class="sign-in-btn spaced-btn">Sign In</button>
            </form>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: appFooter}">
        <footer class="site-footer">
            <p>&copy; 2025 Light the Deal. All rights reserved.</p>
        </footer>
    </div>

</div>
</body>
</html>
