<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register · Light the Deal</title>
    <link rel="stylesheet"  href="/css/home.css">
</head>
<body>
<div class="page-shell">

    <!-- HEADER -->
    <div ></div>

    <main class="hero">

        <section class="auth-card">
            <h2>Create Account</h2>
            <div class="auth-switch" aria-label="Authentication options">
                <a th:href="@{/login}" class="auth-option">Sign In</a>
                <a th:href="@{/register}" class="auth-option active">Register</a>
            </div>
            <form th:action="@{/register}" th:method="post" th:object="${registerRequestUser}">
                <div class="field">
                    <label for="reg-username">Username</label>
                    <input type="text" required id="reg-username" placeholder="Username" th:field="*{username}">
                </div>
                <div class="field">
                    <label for="reg-password">Password</label>
                    <input type="password" required id="reg-password" placeholder="Password" th:field="*{password}">
                </div>
                <div class="field">
                    <label for="reg-confirm-password">Confirm Password</label>
                    <input type="password" required id="reg-confirm-password" placeholder="Confirm password" th:field="*{confirmPassword}">
                </div>
                <div class="field">
                    <label for="reg-email">Email</label>
                    <input type="email" required id="reg-email" placeholder="Email" th:field="*{email}">
                </div>
                <div class="field">
                    <label for="reg-phone">Phone Number</label>
                    <input type="text" required id="reg-phone" placeholder="Phone number" th:field="*{phoneNumber}">
                </div>
                <button type="submit" class="sign-in-btn spaced-btn">Register</button>
            </form>
        </section>

    </main>
    <div th:insert="~{fragments/footer::footer}"> </div>


</div>
</body>
</html>
