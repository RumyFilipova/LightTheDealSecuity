<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register · Light the Deal</title>
    <link rel="stylesheet" th:href="@{/css/home.css}" href="/css/home.css">
</head>
<body>
<div class="page-shell">

    <!-- HEADER -->
    <div th:replace="~{fragments/header :: appHeader}"></div>

    <!-- HERO: same background as home, form centred with generous breathing room -->
    <main class="hero" style="background-image: url('/pics/PicBackground.jpg');">

        <section class="auth-card">
            <h2>Create Account</h2>
            <div class="auth-switch" aria-label="Authentication options">
                <a href="/home"     class="auth-option">Sign In</a>
                <a href="/register" class="auth-option active">Register</a>
            </div>
            <form action="/register" method="post">
                <div class="field">
                    <label for="reg-username">Username</label>
                    <input id="reg-username" name="username" type="text" required>
                </div>
                <div class="field">
                    <label for="reg-email">Email</label>
                    <input id="reg-email" name="email" type="email" required>
                </div>
                <div class="field">
                    <label for="reg-password">Password</label>
                    <input id="reg-password" name="password" type="password" required>
                </div>
                <div class="field">
                    <label for="reg-confirm-password">Confirm Password</label>
                    <input id="reg-confirm-password" name="confirmPassword" type="password" required>
                </div>
                <button type="submit" class="sign-in-btn spaced-btn">Register</button>
            </form>
        </section>

    </main>

    <div th:replace="~{fragments/footer :: appFooter}">
        <!-- fallback for static preview only -->
        <footer class="site-footer">
            <p>&copy; 2025 Light the Deal. All rights reserved.</p>
        </footer>
    </div>

</div>
</body>
</html>
